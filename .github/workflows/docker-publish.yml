name: Build and Publish Jarvis

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # We remove the IMAGE_NAME env here and handle it in the steps

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This 'tags' line uses a trick to force lowercase
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/landingpage:latest
          # Alternatively, if you want it to be automatic:
          # tags: ghcr.io/${{ github.repository_owner }}/landingpage:latest
