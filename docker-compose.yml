services:
  jarvis:
    build: .
    container_name: jarvis
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - jarvis_data:/data
    environment:
      - PORT=3000
      - DATA_FILE=/data/jarvis.json
      - DEFAULT_USERNAME=admin
      - DEFAULT_PASSWORD=admin
      - SESSION_SECRET=change-me-to-something-random

volumes:
  jarvis_data:
